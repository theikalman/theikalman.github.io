---
layout: default
---

<h2 class="section-title">Photography</h2>

{% assign photos = site.photography %}

{%- if photos.size > 0 -%}
<div class="photography-grid">
    {%- for photo in photos -%}
    <article class="photo-card">
        {%- if photo.image -%}
        <img src="{{ photo.image }}" alt="{{ photo.title | escape }}">
        {%- endif -%}
        <div class="photo-info">
            <h3 class="photo-title">
                <a href="{{ photo.url | relative_url }}">{{ photo.title | escape }}</a>
            </h3>
            <span class="photo-date">{{ photo.date | date: "%Y-%m-%d" }}</span>
        </div>
    </article>
    {%- endfor -%}
</div>
{%- endif -%}

{{ content }}
