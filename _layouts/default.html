<!doctype html>
<html lang="en">

{%- include head.html -%}

<body>
    <div class="container">
        <header class="header">
            <h1 class="header-title">
                <a href="/">{{site.title}}</a>
            </h1>
            <nav class="nav">
                <a href="/">~/</a>
                <a href="/photography">photos</a>
                <a href="/about">about</a>
                <a href="/tags">tags</a>
                <a href="/archive">archive</a>
                <a href="/feed.xml">rss</a>
            </nav>
            <div class="search-box">
                <span class="search-icon">></span>
                <input type="text" id="search-input" placeholder="search..." aria-label="Search">
            </div>
            <div id="results-container"></div>
        </header>

        <main>
            {{ content }}
        </main>

        {%- include footer.html -%}
    </div>

    <script src="/assets/simple-jekyll-search.js"></script>
    <script>
        SimpleJekyllSearch({
            searchInput: document.getElementById('search-input'),
            resultsContainer: document.getElementById('results-container'),
            json: '/search.json',
            searchResultTemplate: '<div class="search-result"><a href="{url}">{title}</a></div>',
            noResultsText: 'No results found.'
        });
    </script>
</body>

</html>
